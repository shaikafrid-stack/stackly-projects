spring.application.name=resource-leave-management

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resource_leave_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=NewPassword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ResourceLeaveManagementSecretKey2024SuperSecureAndLongEnoughForHS512Algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

server.port=8080
